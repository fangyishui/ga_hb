name: Build and Push Hertzbeat Docker Images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: '请输入 Docker 镜像标签 (例如: v1.0-offline, latest)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        component: [server, collector]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          mvn clean package -Dmaven.test.skip=true

      # 👇 【核心新增】在打包前，动态修复 Dockerfile 中的 mkdir 报错
      - name: Patch Dockerfile on the fly
        run: |
          echo "正在动态修复 ./script/docker/${{ matrix.component }}/Dockerfile 中的 mkdir 问题..."
          sed -i 's|RUN mkdir /var/run/sshd|RUN mkdir -p /var/run/sshd|g' ./script/docker/${{ matrix.component }}/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./script/docker/${{ matrix.component }}/Dockerfile 
          push: true
          tags: ghcr.io/${{ github.repository }}/hertzbeat-${{ matrix.component }}:${{ github.event.inputs.image_tag || 'latest' }}
