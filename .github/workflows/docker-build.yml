name: Build Hertzbeat Offline Tar

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      # 👇 新增：让你可以手动选择打包成 x86(amd64) 还是 ARM64 架构
      target_platform:
        description: '请选择目标服务器的 CPU 架构'
        required: true
        default: 'linux/arm64'
        type: choice
        options:
          - 'linux/arm64'  # 对应你现在的正式服务器 (M1/M2/M3 Mac, 鲲鹏, 飞腾)
          - 'linux/amd64'  # 对应常规的 Intel/AMD 服务器、PVE 虚拟机

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [server, collector]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          mvn clean package -Dmaven.test.skip=true

      - name: Patch Dockerfile on the fly
        run: |
          sed -i 's|RUN mkdir /var/run/sshd|RUN mkdir -p /var/run/sshd|g' ./script/docker/${{ matrix.component }}/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export to Tar
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./script/docker/${{ matrix.component }}/Dockerfile
          # 👇 动态读取你选择的架构 (如果是代码推送触发，默认打 arm64)
          platforms: ${{ github.event.inputs.target_platform || 'linux/arm64' }}
          tags: hertzbeat-${{ matrix.component }}:latest
          outputs: type=docker,dest=${{ github.workspace }}/hertzbeat-${{ matrix.component }}.tar

      - name: Upload Tar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hertzbeat-${{ matrix.component }}-offline-tar
          path: ${{ github.workspace }}/hertzbeat-${{ matrix.component }}.tar
          retention-days: 7
