name: Build and Push Hertzbeat Docker Image

on:
  push:
    branches:
      - main  # 或者你魔改的分支，比如 master、dev
    tags:
      - 'v*' # 当发布标签如 v1.0.0 时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 授予向 GitHub Packages 写入镜像的权限
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 检出你的魔改代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境 (Hertzbeat 通常需要 JDK 17 或以上，根据实际版本调整)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # 开启 maven 缓存，加速后续构建

      # 3. 编译打包 Java 项目 (生成 jar 包或打包好的目录)
      # 注意：根据 Hertzbeat 官方的构建命令调整，通常是 mvn clean package
      - name: Build with Maven
        run: |
          mvn clean package -Dmaven.test.skip=true

      # 4. 设置 Docker Buildx (用于多架构构建，可选)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. 登录到 GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. 提取 Docker 元数据（标签、版本控制）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/hertzbeat
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      # 7. 构建并推送 Docker 镜像
      # 注意：context 和 file 路径需要对应你项目中 Dockerfile 的实际位置
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./script/docker/Dockerfile # 请根据 Hertzbeat 源码中 Dockerfile 的真实路径调整
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
