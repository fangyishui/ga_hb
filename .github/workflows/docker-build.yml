name: Build and Push Hertzbeat Docker Images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: '请输入 Docker 镜像标签 (例如: v1.0-offline, latest)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 策略配置：同时并行运行 server 和 collector 的构建任务
    strategy:
      matrix:
        component: [server, collector]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 构建整个项目
      - name: Build with Maven
        run: |
          mvn clean package -Dmaven.test.skip=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 根据矩阵变量动态打包路径
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 动态匹配 ./script/docker/server/Dockerfile 或 ./script/docker/collector/Dockerfile
          file: ./script/docker/${{ matrix.component }}/Dockerfile 
          push: true
          # 动态命名镜像：hertzbeat-server 或 hertzbeat-collector
          tags: ghcr.io/${{ github.repository }}/hertzbeat-${{ matrix.component }}:${{ github.event.inputs.image_tag || 'latest' }}
