name: Build Hertzbeat ARM64 Offline Tar

on:
  workflow_dispatch:
    inputs:
      target_platform:
        description: '架构'
        default: 'linux/arm64'

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}

      # 1. 编译
      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true

      # 2. 【核心修复】将编译产物搬运到 Docker 构建目录
      - name: Prepare Docker Build Context
        run: |
          # 假设你的 Dockerfile 在 ./script/docker/server/
          # 这里的路径需根据你实际的 jar 包生成位置微调
          mkdir -p ./script/docker/server/target
          cp manager/target/hertzbeat-manager-*.jar ./script/docker/server/target/app.jar
          # 复制启动脚本
          cp script/bin/entrypoint.sh ./script/docker/server/

      - name: Set up QEMU & Buildx
        uses: docker/setup-qemu-action@v3
        with: {platforms: 'arm64'}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 打包（注意 context 改为了 Dockerfile 所在目录）
      - name: Build and Export to Tar
        uses: docker/build-push-action@v5
        with:
          context: ./script/docker/server/
          file: ./script/docker/server/Dockerfile
          platforms: linux/arm64
          tags: hertzbeat-server:arm64
          outputs: type=docker,dest=${{ github.workspace }}/hertzbeat-server-arm64.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hertzbeat-server-arm64
          path: hertzbeat-server-arm64.tar
