name: Build Hertzbeat Offline Tar (Multi-Arch)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 依然支持手动点击运行

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    strategy:
      # 矩阵配置：同时并行打 x86(amd64) 和 ARM(arm64) 两个架构的包
      matrix:
        component: [server]  # 目前先集中精力解决 server 端
        arch: [amd64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true

      # 👇 这里帮你重新对齐了缩进
      - name: Prepare Docker Context (自动寻宝搬运)
        run: |
          echo "==== 开始准备 Docker 构建上下文 ===="
          CONTEXT_DIR="./script/docker/${{ matrix.component }}"
          mkdir -p $CONTEXT_DIR/target
          
          # 1. 扩大搜索范围：同时匹配 manager 或 server，并排除多余的依赖包
          JAR_PATH=$(find . -type f -name "*.jar" | grep -iE "manager|server" | grep -v "original" | grep -v "sources" | head -n 1)
          
          # 增加调试信息：如果没找到，就把所有打出来的 jar 包名字全打印出来给我们看
          if [ -z "$JAR_PATH" ]; then 
            echo "❌ 致命错误：找不到 jar 包！"
            echo "--- 以下是系统实际生成的所有 Jar 包 ---"
            find . -name "*.jar"
            exit 1
          fi
          
          echo "✅ 找到 Jar 包: $JAR_PATH"
          cp "$JAR_PATH" $CONTEXT_DIR/target/app.jar
          
          # 2. 查找启动脚本
          SCRIPT_PATH=$(find . -type f -name "entrypoint.sh" | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then echo "❌ 致命错误：找不到 entrypoint.sh！" && exit 1; fi
          echo "✅ 找到启动脚本: $SCRIPT_PATH"
          cp "$SCRIPT_PATH" $CONTEXT_DIR/entrypoint.sh
          
          # 3. 修正 SSH 目录创建语法
          sed -i 's|RUN mkdir /var/run/sshd|RUN mkdir -p /var/run/sshd|g' $CONTEXT_DIR/Dockerfile || true
          echo "==== 准备完毕 ===="

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export to Tar
        uses: docker/build-push-action@v5
        with:
          # 上下文严格锁定为 Dockerfile 所在的目录，此时 jar 和脚本已经被搬运到这里了
          context: ./script/docker/${{ matrix.component }}
          file: ./script/docker/${{ matrix.component }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          # 标签明确区分架构： hertzbeat-server:arm64 或 hertzbeat-server:amd64
          tags: hertzbeat-${{ matrix.component }}:${{ matrix.arch }}
          # 导出为 tar
          outputs: type=docker,dest=${{ github.workspace }}/hertzbeat-${{ matrix.component }}-${{ matrix.arch }}.tar

      - name: Upload Tar Artifact
        uses: actions/upload-artifact@v4
        with:
          # 生成的压缩包名称明确标注架构，方便下载
          name: hertzbeat-${{ matrix.component }}-${{ matrix.arch }}-offline-tar
          path: ${{ github.workspace }}/hertzbeat-${{ matrix.component }}-${{ matrix.arch }}.tar
          retention-days: 7
